[project]
name = "eeof-core"
version = "0.1.0"
description = "Shared contracts, data-plane clients, and model providers for the framework."
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eeof_core"]
